<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ເຂົ້າສູ່ລະບົບ - ຂໍ້ມູນສ່ວນຕົວ</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="login-container">
        <h2>LOGIN</h2>
        <p>ກະລຸນາປ້ອນຂໍ້ມູນເພື່ອເຂົ້າສູ່ລະບົບບັນທຶກຂໍ້ມູນ</p>
        
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="ປ້ອນຊື່ຜູ້ໃຊ້ຂອງທ່ານ" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="ປ້ອນລະຫັດຜ່ານ" required>
            </div>
            
            <button type="button" class="btn-login" onclick="checkLogin()">Login</button>
            
            <div class="form-footer">
                <a href="#">ລືມລະຫັດຜ່ານ?</a>
                <p>ຍັງບໍ່ມີບັນຊີ? <a href="#">ລົງທະບຽນຢູ່ທີ່ນີ້</a></p>
            </div>
        </form>
    </div>

    <div id="customAlert" class="modal-overlay">
        <div class="modal-box">
            <div id="modalIcon" class="modal-icon"></div>
            <h3 id="modalTitle">ແຈ້ງເຕືອນ</h3>
            <p id="modalMessage">ຂໍ້ຄວາມແຈ້ງເຕືອນ...</p>
            <button class="btn-close-modal" onclick="closeModal()">ຕົກລົງ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
